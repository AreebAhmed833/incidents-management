version: "3.8"

services:

  flask-app:
    build: .
    image: anishawalgaonkar/incidents-app:v1
    container_name: incidents_flask
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mariadb
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: incident_db
      DB_PORT: 3306
    depends_on:
      - mariadb
    restart: always

  mariadb:
    image: mariadb:10.6
    container_name: incidents_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: incident_db
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always

volumes:
  mariadb_data:
